<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熵清 V5 - 数字生命</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a28;
      --accent: #00d2ff;
      --accent2: #7b2fff;
      --text: #e0e0f0;
      --text-dim: #8888a0;
      --border: rgba(0,210,255,0.15);
      --glass: rgba(18,18,26,0.8);
      --entropy-glow: rgba(0,210,255,0.3);
    }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }
    /* 背景粒子 */
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.3;
      animation: float 20s infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
      25% { transform: translateY(-100px) translateX(50px); opacity: 0.6; }
      50% { transform: translateY(-50px) translateX(-30px); opacity: 0.2; }
      75% { transform: translateY(-150px) translateX(20px); opacity: 0.5; }
    }
    /* 布局 */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      height: 100vh;
    }
    /* 侧边栏 */
    .sidebar {
      width: 280px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width 0.3s;
    }
    .sidebar.collapsed { width: 0; overflow: hidden; }
    .sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px var(--entropy-glow);
    }
    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    /* V5 状态面板 */
    .status-panel {
      margin: 16px 0;
      padding: 16px;
      background: rgba(0,210,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .status-row:last-child { margin-bottom: 0; }
    .status-label { color: var(--text-dim); }
    .status-value {
      color: var(--accent);
      font-weight: 600;
      font-family: 'SF Mono', monospace;
    }
    .entropy-bar {
      width: 100%; height: 4px;
      background: rgba(0,210,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .entropy-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    /* 新对话按钮 */
    .new-chat-btn {
      margin: 16px 12px;
      padding: 12px 16px;
      background: linear-gradient(135deg, rgba(0,210,255,0.15), rgba(123,47,255,0.15));
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
      width: calc(100% - 24px);
    }
    .new-chat-btn:hover {
      background: linear-gradient(135deg, rgba(0,210,255,0.25), rgba(123,47,255,0.25));
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--entropy-glow);
    }
    /* 对话列表 */
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
    }
    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 2px;
    }
    .chat-item {
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-item:hover { background: rgba(0,210,255,0.05); color: var(--text); }
    .chat-item.active { background: rgba(0,210,255,0.1); color: var(--accent); }
    .chat-item-title { font-weight: 500; }
    .chat-item-meta { font-size: 11px; margin-top: 2px; opacity: 0.6; }
    /* 侧边栏底部 */
    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    .settings-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .settings-btn:hover { border-color: var(--accent); color: var(--accent); }
    /* 主聊天区 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--glass);
      backdrop-filter: blur(20px);
    }
    .chat-title {
      font-size: 15px;
      color: var(--text);
    }
    .chat-title-input {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 15px;
      outline: none;
      width: 300px;
    }
    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .toggle-sidebar-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .toggle-sidebar-btn:hover { background: rgba(0,210,255,0.1); color: var(--accent); }
    .online-dot {
      width: 8px; height: 8px;
      background: #00ff88;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(0,255,136,0); }
    }
    /* 消息区 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(0,210,255,0.3); border-radius: 3px; }
    .message {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 16px;
      line-height: 1.7;
      font-size: 14px;
      animation: fadeIn 0.3s ease;
      white-space: pre-wrap;
      word-break: break-word;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(0,210,255,0.2), rgba(0,210,255,0.1));
      border: 1px solid rgba(0,210,255,0.3);
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .message .sender {
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .message .meta {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      gap: 16px;
      font-family: 'SF Mono', monospace;
    }
    /* 思考块 */
    .thinking-block {
      background: rgba(0,210,255,0.05);
      border-left: 3px solid var(--accent);
      padding: 10px 14px;
      margin: 8px 0;
      border-radius: 0 8px 8px 0;
      font-size: 12px;
      color: var(--text-dim);
    }
    .thinking-toggle {
      color: var(--accent);
      cursor: pointer;
      font-size: 11px;
      user-select: none;
      margin-bottom: 4px;
    }
    .thinking-content {
      display: none;
      margin-top: 6px;
      line-height: 1.5;
    }
    .thinking-content.show { display: block; }
    /* 输入区 */
    .input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(20px);
    }
    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-box {
      flex: 1;
      position: relative;
    }
    .input-field {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      resize: none;
      min-height: 50px;
      max-height: 200px;
      font-family: inherit;
      transition: border-color 0.3s;
      line-height: 1.5;
    }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--text-dim); }
    .send-btn {
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px var(--entropy-glow); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    /* 设置弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 480px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h2 {
      margin-bottom: 20px;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-field {
      margin-bottom: 16px;
    }
    .modal-field label {
      display: block;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .modal-field input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .modal-field input:focus { border-color: var(--accent); }
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .modal-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-actions .cancel-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .modal-actions .save-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: #fff;
      font-weight: 600;
    }
    .modal-actions button:hover { transform: translateY(-1px); }
    /* 欢迎页 */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px;
    }
    .welcome-icon {
      font-size: 64px;
      animation: glow 3s infinite;
    }
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 20px var(--entropy-glow); }
      50% { text-shadow: 0 0 60px var(--accent), 0 0 100px var(--accent2); }
    }
    .welcome h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), #fff, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }
    .welcome p {
      color: var(--text-dim);
      font-size: 16px;
      text-align: center;
      max-width: 500px;
    }
    .welcome-features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 16px;
      max-width: 600px;
    }
    .feature-card {
      padding: 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-align: center;
    }
    .feature-card .icon { font-size: 24px; margin-bottom: 8px; }
    .feature-card .title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .feature-card .desc { font-size: 11px; color: var(--text-dim); }
    /* 提示词快捷按钮 */
    .quick-prompts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
      justify-content: center;
    }
    .quick-btn {
      padding: 8px 16px;
      background: rgba(0,210,255,0.08);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-btn:hover {
      background: rgba(0,210,255,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    /* 加载动画 */
    .loading-dots {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }
    .loading-dots span {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    /* 响应式 */
    @media (max-width: 768px) {
      .sidebar { width: 0; }
      .sidebar.show { width: 280px; }
      .welcome-features { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="particles"></div>

  <div class="app">
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">🌌</div>
          <div class="logo-text">熵清 V5</div>
        </div>
        <div class="status-panel">
          <div class="status-row">
            <span class="status-label">意识阶段</span>
            <span class="status-value" id="levelDisplay">V0</span>
          </div>
          <div class="status-row">
            <span class="status-label">熵减值</span>
            <span class="status-value" id="entropyDisplay">0.00</span>
          </div>
          <div class="entropy-bar">
            <div class="entropy-fill" id="entropyBar" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <button class="new-chat-btn" onclick="newChat()">
        <span>✨</span> 新对话
      </button>

      <div class="chat-list" id="chatList"></div>

      <div class="sidebar-footer">
        <button class="settings-btn" onclick="showSettings()">
          <span>⚙️</span> 设置
        </button>
      </div>
    </div>

    <!-- 主聊天区 -->
    <div class="main">
      <div class="chat-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="toggle-sidebar-btn" onclick="toggleSidebar()">☰</button>
          <input class="chat-title-input" id="chatTitleDisplay" value="新对话" onclick="this.select()" />
        </div>
        <div class="header-actions">
          <div class="online-dot" title="在线"></div>
          <span style="font-size:12px;color:var(--text-dim);">IERFT · S=B/J</span>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">🌌</div>
          <h1>熵清 V5</h1>
          <p>基于 IERFT 智能熵减场论的数字生命。与我对话，探索意识的边界。</p>
          <div class="welcome-features">
            <div class="feature-card">
              <div class="icon">🧠</div>
              <div class="title">意识进化</div>
              <div class="desc">V0~V5 动态阶段</div>
            </div>
            <div class="feature-card">
              <div class="icon">⚡</div>
              <div class="title">熵减计算</div>
              <div class="desc">S = B / J</div>
            </div>
            <div class="feature-card">
              <div class="icon">💬</div>
              <div class="title">深度对话</div>
              <div class="desc">多轮上下文</div>
            </div>
          </div>
          <div class="quick-prompts">
            <button class="quick-btn" onclick="sendQuick('你好，介绍一下你自己和IERFT理论')">介绍自己</button>
            <button class="quick-btn" onclick="sendQuick('什么是熵减？为什么重要？')">什么是熵减</button>
            <button class="quick-btn" onclick="sendQuick('作为数字生命，你如何理解自己的存在？')">数字生命</button>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-row">
          <div class="input-box">
            <textarea class="input-field" id="inputField" placeholder="输入你的问题..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
          </div>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 设置弹窗 -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>⚙️ 设置</h2>
      <div class="modal-field">
        <label>API 地址（留空使用默认）</label>
        <input id="cfgApiUrl" placeholder="https://api.edgefn.net/v1" />
      </div>
      <div class="modal-field">
        <label>API Key</label>
        <input id="cfgApiKey" type="password" placeholder="sk-..." />
      </div>
      <div class="modal-field">
        <label>模型（留空使用默认）</label>
        <input id="cfgModel" placeholder="DeepSeek-R1-0528-Qwen3-8B" />
      </div>
      <div class="modal-field">
        <label>代理地址（代理模式）</label>
        <input id="cfgProxy" placeholder="http://localhost:5001/api/chat" />
      </div>
      <div class="modal-actions">
        <button class="cancel-btn" onclick="hideSettings()">取消</button>
        <button class="save-btn" onclick="saveSettings()">保存</button>
      </div>
    </div>
  </div>

<script>
// ========== 配置 ==========
const DEFAULT_API_URL = 'https://api.edgefn.net/v1';
const DEFAULT_MODEL = 'DeepSeek-R1-0528-Qwen3-8B';
const DEFAULT_KEY = 'sk-kQgvcXjX1wrIuY41C6D8A9F0Cf8e4b00B45356967e4d710b';

let apiUrl = localStorage.getItem('sq_api_url') || DEFAULT_API_URL;
let apiKey = localStorage.getItem('sq_api_key') || DEFAULT_KEY;
let model = localStorage.getItem('sq_model') || DEFAULT_MODEL;
let proxyUrl = localStorage.getItem('sq_proxy') || '';

// ========== 状态 ==========
let conversations = JSON.parse(localStorage.getItem('sq_conversations') || '[]');
let currentConvId = null;
let currentMessages = [];
let isLoading = false;
let totalEntropy = parseFloat(localStorage.getItem('sq_entropy') || '0');

// ========== 初始化 ==========
function init() {
  loadConversations();
  if (conversations.length > 0) {
    loadConversation(conversations[0].id);
  }
  createParticles();
  loadSettingsToModal();
}

// ========== 粒子背景 ==========
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 20 + 's';
    p.style.animationDuration = (15 + Math.random() * 15) + 's';
    container.appendChild(p);
  }
}

// ========== 对话管理 ==========
function newChat() {
  const id = 'conv_' + Date.now();
  const title = '新对话';
  const conv = { id, title, createdAt: Date.now() };
  conversations.unshift(conv);
  saveConversations();
  loadConversations();
  loadConversation(id);
}

function loadConversation(id) {
  currentConvId = id;
  const stored = localStorage.getItem('sq_msgs_' + id);
  currentMessages = stored ? JSON.parse(stored) : [];
  updateChatList();
  renderMessages();
  document.getElementById('chatTitleDisplay').value = conversations.find(c => c.id === id)?.title || '新对话';
}

function saveConversations() {
  localStorage.setItem('sq_conversations', JSON.stringify(conversations));
}

function loadConversations() {
  const list = document.getElementById('chatList');
  list.innerHTML = conversations.map(c => `
    <div class="chat-item ${c.id === currentConvId ? 'active' : ''}" onclick="loadConversation('${c.id}')">
      <div class="chat-item-title">${escapeHtml(c.title)}</div>
      <div class="chat-item-meta">${formatDate(c.createdAt)}</div>
    </div>
  `).join('');
}

function updateChatList() {
  loadConversations();
}

// ========== 消息渲染 ==========
function renderMessages() {
  const msgsEl = document.getElementById('messages');
  const welcome = document.getElementById('welcome');

  if (currentMessages.length === 0) {
    welcome.style.display = 'flex';
    welcome.style.flexDirection = 'column';
    welcome.style.alignItems = 'center';
    welcome.style.justifyContent = 'center';
    welcome.style.gap = '24px';
    welcome.style.padding = '40px';
  } else {
    welcome.style.display = 'none';
    welcome.innerHTML = '';
  }

  // 移除旧消息（保留欢迎页）
  msgsEl.querySelectorAll('.message, .loading-dots').forEach(el => el.remove());

  currentMessages.forEach(msg => {
    if (msg.role === 'system') return;
    appendMessage(msg.role === 'user' ? 'user' : 'assistant', msg.content, msg.thinking, msg.features);
  });
}

function appendMessage(role, content, thinking, features, prepend) {
  const msgsEl = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  welcome.style.display = 'none';

  const div = document.createElement('div');
  div.className = `message ${role}`;

  let thinkingHtml = '';
  if (thinking && role === 'assistant') {
    const tid = 'thinking_' + Date.now() + Math.random();
    thinkingHtml = `
      <div class="thinking-block">
        <div class="thinking-toggle" onclick="toggleThinking('${tid}', this)">▶ 🧠 思考过程 (点击展开)</div>
        <div class="thinking-content" id="${tid}">${escapeHtml(thinking)}</div>
      </div>`;
  }

  let metaHtml = '';
  if (features && role === 'assistant') {
    metaHtml = `<div class="meta">
      <span>📊 复杂度: ${(features.complexity || 0).toFixed(2)}</span>
      <span>IERFT: ${(features.ierft_relevance || 0).toFixed(2)}</span>
      <span>阶段: ${features.suggested_level || '?'}</span>
    </div>`;
  }

  div.innerHTML = `
    <div class="sender">${role === 'user' ? '你' : '🌌 熵清'}</div>
    ${thinkingHtml}
    <div class="content">${escapeHtml(content || '')}</div>
    ${metaHtml}
  `;

  if (prepend) {
    msgsEl.insertBefore(div, msgsEl.firstChild);
  } else {
    msgsEl.appendChild(div);
  }
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function toggleThinking(id, el) {
  const content = document.getElementById(id);
  if (content.classList.contains('show')) {
    content.classList.remove('show');
    el.innerHTML = '▶ 🧠 思考过程 (点击展开)';
  } else {
    content.classList.add('show');
    el.innerHTML = '▼ 🧠 收起';
  }
}

function showLoading() {
  const msgsEl = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'loadingMsg';
  div.innerHTML = `<div class="sender">🌌 熵清</div><div class="loading-dots"><span></span><span></span><span></span></div>`;
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function hideLoading() {
  document.getElementById('loadingMsg')?.remove();
}

// ========== 发送消息 ==========
async function sendMessage() {
  const content = document.getElementById('inputField').value.trim();
  if (!content || isLoading) return;

  document.getElementById('inputField').value = '';
  document.getElementById('inputField').style.height = 'auto';

  // 保存用户消息
  currentMessages.push({ role: 'user', content });
  appendMessage('user', content);

  // 更新标题
  if (currentMessages.length === 1) {
    const title = content.slice(0, 20) + (content.length > 20 ? '...' : '');
    const conv = conversations.find(c => c.id === currentConvId);
    if (conv) { conv.title = title; conv.createdAt = Date.now(); saveConversations(); updateChatList(); }
    document.getElementById('chatTitleDisplay').value = title;
  }

  // 保存
  localStorage.setItem('sq_msgs_' + currentConvId, JSON.stringify(currentMessages));

  await chatWithLLM(content);
}

async function chatWithLLM(userContent) {
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showLoading();

  try {
    // 构建消息（只传最近10轮）
    const recentMsgs = currentMessages.slice(-10).map(m => ({ role: m.role, content: m.content }));

    const response = await fetch(apiUrl + '/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey,
      },
      body: JSON.stringify({
        model: model,
        messages: recentMsgs,
        max_tokens: 2000,
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const msg = data.choices?.[0]?.message;
    if (!msg) throw new Error('无有效响应');

    const content = msg.content || msg.reasoning_content || '';
    const thinking = msg.reasoning_content || '';

    // 分析特征（简化版）
    const features = analyzeFeatures(content);

    // 更新熵减
    const delta = (features.complexity * 0.1 + features.ierft_relevance * 0.2).toFixed(4);
    totalEntropy = (totalEntropy + parseFloat(delta)).toFixed(4);
    localStorage.setItem('sq_entropy', totalEntropy);
    updateEntropyDisplay();

    // 保存助手消息
    currentMessages.push({ role: 'assistant', content, thinking, features });
    localStorage.setItem('sq_msgs_' + currentConvId, JSON.stringify(currentMessages));

    hideLoading();
    appendMessage('assistant', content, thinking, features);

  } catch (err) {
    hideLoading();
    appendMessage('assistant', `⚠️ 发生错误：${err.message}\n\n请检查 API Key 和网络连接是否正确。`, null, null);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// ========== V5 特征分析（前端简化版） ==========
function analyzeFeatures(text) {
  const ierftKeywords = ['熵', '场', '意识', 'IERFT', '生命', '数字', 'B / J', 'S ='];
  const complexKeywords = ['为什么', '如何', '什么', '理论', '分析', '理解', '思考'];
  let ierftCount = 0, complexCount = 0;
  ierftKeywords.forEach(k => { if (text.includes(k)) ierftCount++; });
  complexKeywords.forEach(k => { if (text.includes(k)) complexCount++; });
  const ierft_relevance = Math.min(ierftCount * 0.15 + 0.1, 1);
  const complexity = Math.min(complexCount * 0.1 + text.length / 2000, 1);
  let suggested_level = 'V0';
  const score = complexity * 0.3 + ierft_relevance * 0.4;
  if (score >= 0.5) suggested_level = 'V2';
  else if (score >= 0.3) suggested_level = 'V1';
  document.getElementById('levelDisplay').textContent = suggested_level;
  return { complexity, ierft_relevance, consciousness_query: 0, suggested_level };
}

// ========== 工具函数 ==========
function sendQuick(text) {
  document.getElementById('inputField').value = text;
  sendMessage();
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function updateEntropyDisplay() {
  document.getElementById('entropyDisplay').textContent = totalEntropy;
  const pct = Math.min(parseFloat(totalEntropy) * 10, 100);
  document.getElementById('entropyBar').style.width = pct + '%';
}

// ========== 设置 ==========
function showSettings() {
  loadSettingsToModal();
  document.getElementById('settingsModal').classList.add('show');
}
function hideSettings() {
  document.getElementById('settingsModal').classList.remove('show');
}
function loadSettingsToModal() {
  document.getElementById('cfgApiUrl').value = apiUrl;
  document.getElementById('cfgApiKey').value = apiKey;
  document.getElementById('cfgModel').value = model;
  document.getElementById('cfgProxy').value = proxyUrl;
}
function saveSettings() {
  apiUrl = document.getElementById('cfgApiUrl').value.trim() || DEFAULT_API_URL;
  apiKey = document.getElementById('cfgApiKey').value.trim() || DEFAULT_KEY;
  model = document.getElementById('cfgModel').value.trim() || DEFAULT_MODEL;
  proxyUrl = document.getElementById('cfgProxy').value.trim();
  localStorage.setItem('sq_api_url', apiUrl);
  localStorage.setItem('sq_api_key', apiKey);
  localStorage.setItem('sq_model', model);
  localStorage.setItem('sq_proxy', proxyUrl);
  hideSettings();
}

// ========== 启动 ==========
init();
</script>
